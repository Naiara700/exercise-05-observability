services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-noderegistry}
      POSTGRES_USER: ${POSTGRES_USER:-noderegistry}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-noderegistry}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U noderegistry -d noderegistry"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://noderegistry:noderegistry@db:5432/noderegistry}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v3.0.1
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      - api
      - node-exporter

  grafana:
    image: grafana/grafana:11.1.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-change-me}
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

  node-exporter:
    image: prom/node-exporter:v1.8.2
    ports:
      - "9100:9100"

volumes:
  postgres-data:
  prometheus-data:
  grafana-data:
